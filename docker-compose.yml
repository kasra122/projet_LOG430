version: "3.8"

services:

  postgres:
    image: postgres:16
    container_name: canbankx-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-canbankx}
      POSTGRES_USER: ${POSTGRES_USER:-canbankx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-canbankx}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canbankx"]
      interval: 10s
      timeout: 5s
      retries: 5

  customer-service:
    build: ./services/customer-service
    container_name: canbankx-customer-service
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-canbankx}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-canbankx}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-canbankx}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-CanBankX_Default_Secret_Change_In_Production_2024}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api-gateway:
    image: nginx:1.25-alpine
    container_name: canbankx-gateway
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - customer-service
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: canbankx-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    depends_on:
      - customer-service

  grafana:
    image: grafana/grafana:10.4.0
    container_name: canbankx-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  postgres-data:
  prometheus-data:
  grafana-data: