services:
  canbankx-app:
    build:
      context: .
      dockerfile: services/customer-service/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  canbankx-gateway:
    build: ./services/api-gateway
    ports:
      - "8081:8080"
    depends_on:
      - canbankx-app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: canbankx
    ports:
      - "5432:5432"
