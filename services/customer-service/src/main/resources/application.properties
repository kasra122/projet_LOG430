# Server Configuration
server.port=8082
server.servlet.context-path=/
spring.application.name=kasra-customer-service

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/kasra_bank
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Logging
logging.level.com.canbankx=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN

# Bank Configuration - Interbank URLs
bank.interbank-urls.bank-1=http://localhost:8081
bank.interbank-urls.bank-3=http://localhost:8083
bank.central-bank-url=http://localhost:9000

# Actuator (Monitoring)
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# HTTP Client Timeouts
spring.http.client.connect-timeout=5000
spring.http.client.read-timeout=10000