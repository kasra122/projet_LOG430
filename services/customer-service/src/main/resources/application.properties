# Server
server.port=8081
server.servlet.context-path=/

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/canbankx_customer
spring.datasource.username=canbankx_user
spring.datasource.password=canbankx_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Banking
bank.id=2
bank.central-bank-url=http://central-bank:8090

# Logging
logging.level.com.canbankx=DEBUG
logging.level.org.springframework.web=INFO

# Actuator
management.endpoints.web.exposure.include=health,metrics,prometheus
