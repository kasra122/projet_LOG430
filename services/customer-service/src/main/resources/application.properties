server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/canbankx}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:canbankx}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:canbankx}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health,prometheus,metrics,info
management.endpoint.health.show-details=always
management.metrics.tags.application=canbankx-customer-service

# JWT Configuration
app.jwt.secret=${JWT_SECRET:CanBankX_Default_Secret_Change_In_Production_2024}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Logging
logging.level.com.canbankx=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n